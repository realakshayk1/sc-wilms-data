# Phase C — spatial agent-based model (PhysiCell) configuration.
# Authoring runs on CPU; the simulations themselves run on a cluster.
seed: 42

compartments: [blastemal, epithelial, stromal]   # v1 granularity

# Visium capture geometry (10x). spot_diameter_fullres in scalefactors_json maps to
# SPOT_DIAMETER_UM; center-to-center pitch is fixed at 100 um on the standard array.
spot:
  diameter_um: 55.0
  pitch_um: 100.0
  place_radius_um: 27.5          # jitter agents within half the spot diameter

# Initial cell number per Visium location (N_cells_per_location prior).
# NOTE: StarDist here runs on hires spot tiles and undercounts absolute nuclei (the
# documented resolution ceiling) — it is trustworthy for morphology, not for absolute
# counts. So the default prior is a literature value for a 55 um capture spot in dense
# small-round-blue-cell tumor (~10-15 cells); 'stardist' is available for relative
# per-spot variation once WSI-resolution segmentation exists.
density:
  source: fixed                  # fixed | stardist
  fixed_n: 12                    # literature prior, cells per 55 um spot
  min_n: 1
  max_n: 40

# Which spot-level fractions seed agent identities.
deconvolution:
  backend: program_softmax        # program_softmax | nnls | cell2location
  frac_cols: [deconv_blastemal, deconv_epithelial, deconv_stromal]

domain:
  margin_um: 100.0                # padding around the tumor bounding box
  z_um: 0.0                       # 2-D monolayer for v1

# Spatial validation QoIs (07_validate.py). co-occurrence is evaluated on a distance grid
# (multiples of the spot pitch); neighbourhood enrichment uses a kNN graph.
spatial_qoi:
  # inhouse (default, fast, no extra deps) is always computed. Set 'squidpy' or 'auto'
  # (squidpy if importable) to ALSO emit squidpy nhood z + Ripley's L — slower (Ripley is
  # ~O(n^2) over full-resolution spots), so opt in explicitly rather than by default.
  backend: inhouse                # inhouse | auto | squidpy
  knn: 6                          # Visium hex neighbourhood
  n_perm: 1000                    # enrichment permutations
  cooccur_radii_um: [50, 100, 150, 200, 300, 400, 500, 700, 1000]

simulation:
  max_time_min: 4320              # 3 days
  save_interval_min: 60
  replicates: 20                  # per tumor (cluster)

# One-at-a-time sensitivity analysis (perturb each uncertain parameter by +/- pct).
# Base values are the defaults used by Stages 3-4; the cluster wrapper applies the
# per-run override to rules.csv / PhysiCell_settings.xml.
uq:
  pct_levels: [1, 5, 10, 20]      # symmetric +/- perturbations, percent
  params:
    oxygen_cycle_half_max: 10.0   # rules: oxygen -> cycle entry half-max (mmHg)
    oxygen_necrosis_half_max: 5.0 # rules: oxygen -> necrosis half-max (mmHg) [per-tumor: hypoxia score]
    pressure_half_max: 1.0        # rules: pressure -> cycle entry half-max [per-tumor: contact-inhibition score]
    adhesion_strength: 0.4        # mechanics base (overridden per tumor if present)
    migration_speed: 0.3          # mechanics base (per-tumor EMT-scaled; um/min)
    proliferation_saturation: 1.0 # multiplier on rule saturation values

# Per-tumor determination of base rates + rule half-maxes from omics program scores
# (phase2_histology_ml/17_positives_to_abm.py). Transparent, bounded, no fitting. Absent
# score columns -> neutral (multiplier 1.0 / base half-max). See config/abm_programs.yaml.
omics_to_params:
  # base-rate multipliers: value = base * clip(1 + k*z, lo, hi) on the per-tumor program z-score
  emt_adhesion_k: 0.25          # +1 SD mesenchymal EMT index -> ~0.75x adhesion (reciprocal below)
  emt_motility_k: 0.40          # +1 SD mesenchymal EMT index -> ~1.4x migration speed
  adhesion_bounds: [0.4, 1.6]
  motility_bounds: [0.4, 2.0]
  # rule half-max shifts: half_max = base * clip(1 - k*z, lo, hi); higher program -> lower half-max
  pressure_halfmax_k: 0.30      # higher contact-inhibition -> brake engages at lower pressure
  necrosis_halfmax_k: 0.30      # higher hypoxia tolerance -> necrosis at lower O2
  halfmax_bounds: [0.5, 1.5]
  # v1.1 substrate-uptake axis: per-cell IGF2 uptake = base * clip(1 + k*z_igf, lo, hi)
  igf_uptake_k: 0.40            # +1 SD IGF program -> ~1.4x IGF2 uptake (11p15 LOI Wilms driver)
  uptake_bounds: [0.4, 2.5]

# v1.1 BioFVM substrates beyond oxygen (04_build_model.py writes microenvironment + per-cell
# secretion; 03_emit_rules.py adds IGF2->cycle-entry and ECM->migration rules).
#   IGF2 — diffusible growth factor; the Wilms analog of the CRPC androgen-uptake axis. Tumor
#          cells take it up (rate from the IGF program); local depletion couples clones.
#   ECM  — near-static matrix secreted by stromal cells; dense ECM impedes motility (the
#          Johnson et al. 2025 PDAC "fibroblast barrier" effect, monotonic form for v1.1).
substrates:
  IGF2:
    diffusion: 1000.0           # um^2/min (small secreted peptide)
    decay: 0.01                 # 1/min
    initial: 1.0                # dimensionless concentration
    boundary: 1.0               # Dirichlet at domain edge = systemic supply
    dirichlet: true
  ECM:
    diffusion: 0.0              # matrix does not diffuse
    decay: 0.0
    initial: 0.0                # accumulates where stroma secretes it
    boundary: 0.0
    dirichlet: false
